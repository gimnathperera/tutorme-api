name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  ACR_REGISTRY: tutormebackend.azurecr.io
  IMAGE_NAME: tuitionlanka-api-fork
  APP_SERVICE_NAME: tuitionlanka-api-fork
  RESOURCE_GROUP: TutorMe

jobs:
  build-and-deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name tutormebackend

      - name: Build and push Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker build \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${SHORT_SHA} \
            .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${SHORT_SHA}
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Deploy to Production App Service
        run: |
          az webapp config container set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          az webapp restart \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          # Skip if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release creation."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --draft \
              --generate-notes
            echo "Draft release created: $TAG"
          fi

      - name: Print deployment summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Deployed image: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${SHORT_SHA}"
          echo "App Service: ${{ env.APP_SERVICE_NAME }}"
          echo "Release tag: v${VERSION}"
