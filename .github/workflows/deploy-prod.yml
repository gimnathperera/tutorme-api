name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  ACR_REGISTRY: tutormebackend.azurecr.io
  IMAGE_NAME: tutorme-api
  APP_SERVICE_NAME: tutorme-backend-api
  RESOURCE_GROUP: TutorMe

jobs:
  build-and-deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name tutormebackend

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ env.SHORT_SHA }} \
            .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ env.SHORT_SHA }}

      - name: Deploy to Production App Service
        run: |
          az webapp config container set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          az webapp restart \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Print deployment summary
        run: |
          echo "Deployed image: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ env.SHORT_SHA }}"
          echo "App Service: ${{ env.APP_SERVICE_NAME }}"
