name: Deploy to QA

on:
  push:
    branches:
      - develop

env:
  ACR_REGISTRY: tutormebackend.azurecr.io
  IMAGE_NAME: tuitionlanka-api-fork-qa
  APP_SERVICE_NAME: tuitionlanka-api-fork-qa
  RESOURCE_GROUP: TutorMe

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27017/tutorme-test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION_MINUTES: 30
          JWT_REFRESH_EXPIRATION_DAYS: 30
        run: npm test

  build-and-deploy:
    name: Build & Deploy to QA
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker build \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:qa \
            -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${SHORT_SHA} \
            .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:qa
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${SHORT_SHA}

      - name: Print deployment summary
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "Deployed image: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${SHORT_SHA}"
          echo "App Service: ${{ env.APP_SERVICE_NAME }}"
          echo "App Service will restart automatically via ACR webhook."
